name: Stash
options:
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 6.29.0
  HotKey:
    url: https://github.com/soffes/HotKey
    from: 0.2.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

targets:
  Stash:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Stash
    info:
      path: Stash/Resources/Info.plist
      properties:
        LSUIElement: YES
        CFBundleName: Stash
        CFBundleDisplayName: Stash
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSHumanReadableCopyright: "Copyright © 2026 soi"
        NSAppleEventsUsageDescription: "Stash uses Apple Events to paste into the active app."
        CFBundleURLTypes:
          - CFBundleURLName: com.soi.stash
            CFBundleURLSchemes: [stash]
        SUFeedURL: https://github.com/ncthanhngo/stash/releases/latest/download/appcast.xml
        SUPublicEDKey: zkx2LvzfHOZJ0Z5BAcPogHdSx7ClEixTYZqTE4CC/CY=
        SUEnableAutomaticChecks: true
    entitlements:
      path: Stash/Resources/Stash.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.soi.stash
        PRODUCT_NAME: Stash
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Stash Dev"
        DEVELOPMENT_TEAM: ""
        OTHER_CODE_SIGN_FLAGS: "--timestamp=none"
        SWIFT_VERSION: "5.9"
        ENABLE_HARDENED_RUNTIME: NO
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "2"
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    dependencies:
      - package: GRDB
        product: GRDB
      - package: HotKey
        product: HotKey
      - package: Sparkle
        product: Sparkle

  StashTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: StashTests
    dependencies:
      - target: Stash
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.soi.stash.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Stash.app/Contents/MacOS/Stash"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_IDENTITY: "-"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Stash:
    build:
      targets:
        Stash: all
        StashTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - StashTests
    archive:
      config: Release
