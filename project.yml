name: Clipstash
options:
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: 6.29.0
  HotKey:
    url: https://github.com/soffes/HotKey
    from: 0.2.0

targets:
  Clipstash:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Clipstash
    info:
      path: Clipstash/Resources/Info.plist
      properties:
        LSUIElement: YES
        CFBundleName: Clipstash
        CFBundleDisplayName: Clipstash
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSHumanReadableCopyright: "Copyright © 2026 soi"
        NSAppleEventsUsageDescription: "Clipstash uses Apple Events to paste into the active app."
    entitlements:
      path: Clipstash/Resources/Clipstash.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.soi.clipstash
        PRODUCT_NAME: Clipstash
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "5.9"
        ENABLE_HARDENED_RUNTIME: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    dependencies:
      - package: GRDB
        product: GRDB
      - package: HotKey
        product: HotKey

  ClipstashTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: ClipstashTests
    dependencies:
      - target: Clipstash
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.soi.clipstash.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Clipstash.app/Contents/MacOS/Clipstash"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_IDENTITY: "-"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Clipstash:
    build:
      targets:
        Clipstash: all
        ClipstashTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ClipstashTests
    archive:
      config: Release
